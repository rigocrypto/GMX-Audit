<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMX Audit Presentation</title>
  <style>
    :root {
      --bg: #050816;
      --panel: #0b1026;
      --text: #eaf0ff;
      --accent: #7b5cff;
      --accent2: #2f8bff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #141a40 0%, var(--bg) 45%), linear-gradient(135deg, #080c1f 0%, #04060f 100%);
      color: var(--text);
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      padding: 20px;
    }

    .shell {
      width: min(1100px, 96vw);
      border: 1px solid rgba(123, 92, 255, 0.35);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(16, 22, 52, 0.96), rgba(8, 11, 28, 0.96));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .head {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(123, 92, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(90deg, rgba(123, 92, 255, 0.14), rgba(47, 139, 255, 0.1));
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.4px;
      margin: 0;
      font-size: 16px;
    }

    .back {
      color: #cdd8ff;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid rgba(205, 216, 255, 0.25);
      border-radius: 999px;
      padding: 6px 12px;
    }

    .back:hover {
      border-color: rgba(205, 216, 255, 0.55);
      color: #ffffff;
    }

    .player {
      padding: 14px;
    }

    video {
      width: 100%;
      max-height: 78vh;
      background: #000;
      border-radius: 12px;
      border: 1px solid rgba(47, 139, 255, 0.3);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="head">
      <h1 class="title">GMX Audit Product Presentation</h1>
      <a class="back" href="overview.html">Back to Dashboard</a>
    </div>
    <div class="player">
      <video controls preload="metadata">
        <source src="https://raw.githubusercontent.com/rigocrypto/bounty-rotation-harness/main/docs/assets/GMX-AUDITS-Vid.mp4" type="video/mp4" />
        Your browser does not support embedded video playback.
      </video>
    </div>
  </main>
</body>
</html>
