[profile.default]
src = "contracts"
out = "artifacts"
libs = ["node_modules", "lib"]
test = "test"
cache_path = "cache/foundry"
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=node_modules/@openzeppelin/",
]
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./" }]

[profile.default.fuzz]
runs = 500
seed = "0xdeadbeef"
max_test_rejects = 65536

[profile.default.invariant]
runs = 500
depth = 50
fail_on_revert = false
call_override = false
shrink_run_limit = 256

[profile.extended]
# Inherit default, override fuzz/invariant settings for deeper runs
[profile.extended.fuzz]
runs = 2000
seed = "0xdeadbeef"
max_test_rejects = 65536

[profile.extended.invariant]
runs = 1000
depth = 100
fail_on_revert = false
shrink_run_limit = 512

[rpc_endpoints]
base = "${BASE_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
avalanche = "${AVALANCHE_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }

[profile.default.rpc_storage_caching]
chains = ["base"]
endpoints = "all"

# Run with: forge test --match-contract MoonwellInvariantTest --fork-url $BASE_RPC_URL -vv
# Extended: FOUNDRY_PROFILE=extended forge test --match-contract MoonwellInvariantTest --fork-url $BASE_RPC_URL -vvv
