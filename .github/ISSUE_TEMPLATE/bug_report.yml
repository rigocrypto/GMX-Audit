name: Bug Report
description: Report a reproducible bug in the bounty-rotation-harness
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal set of steps to reproduce the bug.
      placeholder: |
        1. Run `npm run smoke:all`
        2. Observe error output...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error output/logs if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package / Commit Version
      description: Output of `git rev-parse --short HEAD` or the npm package version.
      placeholder: "e.g. a1b2c3d or 1.2.3"
    validations:
      required: false

  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "e.g. v20.11.0"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: false

  - type: checkboxes
    id: security
    attributes:
      label: Security Notice
      options:
        - label: I have NOT included any private keys, mnemonics, API keys, or secrets in this report.
          required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs that may help diagnose the issue.
