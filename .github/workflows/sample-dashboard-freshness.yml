name: Sample Dashboard Freshness

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sample-dashboard-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate sample dashboard
        run: npm run dashboard:sample

      - name: Verify committed sample is up to date
        shell: bash
        run: |
          if ! git diff --quiet -- examples/sample-dashboard/; then
            echo "Sample dashboard is stale."
            echo "Run: npm run dashboard:sample"
            echo "Then commit updated files under examples/sample-dashboard/."
            git diff -- examples/sample-dashboard/
            exit 1
          fi
